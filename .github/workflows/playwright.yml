name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Smoke Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --registry https://registry.npmjs.org

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Create .env from GitHub Secrets
        run: |
          cat <<EOF > .env
          SAUCE_PASSWORD=${{ secrets.SAUCE_PASSWORD }}
          SAUCE_USER_STANDARD=standard_user
          SAUCE_USER_LOCKED=locked_out_user
          SAUCE_USER_PROBLEM=problem_user
          SAUCE_USER_PERFORMANCE=performance_glitch_user
          SAUCE_USER_ERROR=error_user
          SAUCE_USER_VISUAL=visual_user
          EOF

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/**/trace.zip
          retention-days: 30
